name: golangci-lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Cache modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/golangci-lint
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.59.0
          args: --timeout=3m
